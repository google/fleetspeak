syntax = "proto3";

package fleetspeak.stdinservice;

option go_package = "github.com/google/fleetspeak/fleetspeak/src/client/stdinservice/proto/fleetspeak_stdinservice";

// The configuration information expected by stdinservice.Factory
// in ClientServiceConfig.config.
message Config {
  string cmd = 1;

  // Command line arguments.
  // These arguments are prepended to the arguments specified in the message.
  repeated string args = 2;

  // Log level for the service.
  LogLevel log_level = 3;
}

// The log level for the service, defining what command output should be logged
// locally. This does not affect the output that is included in responses to
// the server.
enum LogLevel {
  LOG_LEVEL_NONE = 0;
  LOG_LEVEL_STDERR = 1;
  LOG_LEVEL_ALL = 2;
}
